name: PSScriptAnalyzer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # Preflight: probe Pool P1 (self-hosted, personal) for online runners.
  # Returns ["self-hosted","personal"] when available; otherwise ["ubuntu-latest"].
  # See martinopedal/personal-runners-infra (.github/workflows/runner-preflight.yml).
  preflight:
    uses: martinopedal/personal-runners-infra/.github/workflows/runner-preflight.yml@main
    with:
      desired_label: personal
      os: linux
      min_online: 1
    permissions:
      actions: read
      contents: read
    secrets:
      PREFLIGHT_TOKEN: ${{ secrets.PREFLIGHT_TOKEN }}

  lint:
    name: Lint PowerShell
    needs: preflight
    runs-on: ${{ fromJSON(needs.preflight.outputs.runner_label) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run PSScriptAnalyzer
        uses: microsoft/psscriptanalyzer-action@6b2948b1944407914a58661c49941824d149734f  # v1.1
        with:
          path: ./scripts
          recurse: true
          output: results.sarif
          severity: error

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1
        if: always()
        with:
          sarif_file: results.sarif
          category: psscriptanalyzer
